apiVersion: v1
kind: ConfigMap
metadata:
  name: kapparmor-profiles
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kapparmor.labels" . | nindent 4 }}
    {{- with .Values.app.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- if .Values.profiles }}
data:
  {{- toYaml .Values.profiles | nindent 2 }}
{{- else }}
data: {}
{{- end }}
